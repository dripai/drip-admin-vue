spring:
  application:
    name: drip-admin-backend
  profiles:
    active: dev
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

sa-token:
  token-name: Authorization
  timeout: 7200
  active-timeout: 1800
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false

drip:
  session:
    idle-timeout-seconds: 1800
    max-duration-seconds: 28800
  upload:
    max-size-bytes: 10485760
    allowed-types: image/png,image/jpeg,application/pdf
  database:
    backup-dir: ./backups
