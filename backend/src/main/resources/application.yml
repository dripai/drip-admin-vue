spring:
  application:
    name: drip-admin-backend
  profiles:
    active: dev
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

mybatis-plus:
  type-aliases-package: com.drip.admin.modules.system.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

sa-token:
  token-name: Authorization
  timeout: 7200
  active-timeout: 1800
  is-concurrent: false
  is-share: false
  token-style: uuid
  is-log: false

drip:
  session:
    idle-timeout-seconds: 1800
    max-duration-seconds: 28800
  database:
    backup-dir: ./backups
    mysqldump-command: mysqldump
    mysql-command: mysql
